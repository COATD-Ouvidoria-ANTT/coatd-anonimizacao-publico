services:
  motor-anonimizacao:
    image: motor-anonimizacao-base
    container_name: pipeline-anonimizacao

    profiles:
      - cpu

    env_file:
      - .env

    volumes:
      - ../ABNT:/app/ABNT
      - ../ner/models:/app/models
      - ../_quarto.yml:/app/_quarto.yml
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./outputs:/app/outputs

    working_dir: /app

    environment:
      - ARQUITETURA_ALVO=tok2vec
    
    command: >
      bash -c "quarto render scripts/qmd/anonimizacao_falabr.qmd && mkdir -p outputs/pdf && mv scripts/qmd/*.pdf outputs/pdf/"

  motor-anonimizacao-transformers:
    image: motor-anonimizacao-transformers
    container_name: pipeline-anonimizacao-transformers

    profiles:
      - transformers

    volumes:
      - ../ABNT:/app/ABNT
      - ../_quarto.yml:/app/_quarto.yml
      - ./models:/app/models
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./outputs:/app/outputs

    working_dir: /app

    environment:
      - ARQUITETURA_ALVO=transformer

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    command: >
      bash -c "quarto render scripts/qmd/anonimizacao_falabr_transformers.qmd && mkdir -p outputs/pdf && mv scripts/qmd/*.pdf outputs/pdf/"