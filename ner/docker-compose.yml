version: '3.8'

services:
  motor-ner:
    image: motor-anonimizacao-base
    container_name: pipeline-ner

    volumes:
      - ../ABNT:/app/ABNT
      - ../_quarto.yml:/app/_quarto.yml
      - ./models:/app/models
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./outputs:/app/outputs

    working_dir: /app

    command: >
      bash -c "quarto render scripts/qmd/ner.qmd && mkdir -p outputs/pdf && mv scripts/qmd/*.pdf outputs/pdf/"